<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340" role="img" aria-label="Quantis — spec-driven development for AI coding agents">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f1f"/>
      <stop offset="0.55" stop-color="#141a38"/>
      <stop offset="1" stop-color="#202b60"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6ea8fe"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <style>
      .title { font-family: "Segoe UI", Helvetica, Arial, sans-serif; font-weight: 800; }
      .sub   { font-family: "Segoe UI", Helvetica, Arial, sans-serif; font-weight: 600; }
      .mono  { font-family: "SF Mono", "Consolas", "Roboto Mono", monospace; font-weight: 500; }
    </style>
  </defs>

  <rect width="1200" height="340" rx="24" fill="url(#bg)"/>
  <rect x="3" y="3" width="1194" height="334" rx="22" fill="none" stroke="url(#accent)" stroke-opacity="0.25" stroke-width="2"/>

  <text x="600" y="150" text-anchor="middle" class="title" font-size="118" letter-spacing="6" fill="#ffffff">QUANTIS</text>
  <text x="600" y="206" text-anchor="middle" class="sub" font-size="30" fill="url(#accent)">Stop vibecoding. Ship with proof.</text>

  <!-- pipeline motif -->
  <g transform="translate(0,272)">
    <line x1="330" y1="0" x2="870" y2="0" stroke="#3a4583" stroke-width="2"/>
    <g class="mono" font-size="19" fill="#aab3d8" text-anchor="middle">
      <circle cx="330" cy="0" r="6" fill="#6ea8fe"/><text x="330" y="34">Spec</text>
      <circle cx="465" cy="0" r="6" fill="#7c9cfe"/><text x="465" y="34">Plan</text>
      <circle cx="600" cy="0" r="6" fill="#8e90fb"/><text x="600" y="34">Execute</text>
      <circle cx="735" cy="0" r="6" fill="#9d8cf9"/><text x="735" y="34">Verify</text>
      <circle cx="870" cy="0" r="6" fill="#a78bfa"/><text x="870" y="34">Commit</text>
    </g>
  </g>
</svg>
